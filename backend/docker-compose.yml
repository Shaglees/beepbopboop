services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: beepbopboop
      POSTGRES_PASSWORD: beepbopboop
      POSTGRES_DB: beepbopboop
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beepbopboop"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://beepbopboop:beepbopboop@db:5432/beepbopboop?sslmode=disable"
      FIREBASE_CREDENTIALS_FILE: "${FIREBASE_CREDENTIALS_FILE:-}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    stop_grace_period: 15s

volumes:
  pgdata:
